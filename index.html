<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earring AR - Precision Tracking</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #container { 
            position: relative; 
            width: 100%; 
            max-width: 640px; 
            display: flex;
            justify-content: center;
        }
        video { display: none; } 
        canvas { 
            width: 100%; 
            height: auto; 
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }
        .ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            text-align: left;
            pointer-events: none;
            z-index: 10;
        }
        #status { 
            font-size: 1em;
            color: #00ff88; 
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 5px;
        }
        .fps-counter {
            background: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="ui-panel">
            <div id="status">Booting AI Worker...</div>
            <div class="fps-counter">
                <div id="videoFps" style="color: #00ff88;">Cam: 0 FPS</div>
                <div id="aiFps" style="color: #ffaa00;">AI: 0 FPS</div>
            </div>
        </div>

        <video id="video" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
    </div>
    
    <canvas id="processCanvas" width="256" height="256" style="display:none;"></canvas>

    <script>
        const IMAGE_SIZE = 256; 
        const SNAP_SPEED = 0.35; 
        
        let video = document.getElementById('video');
        let outputCanvas = document.getElementById('outputCanvas');
        let ctx = outputCanvas.getContext('2d', { willReadFrequently: true });
        let processCanvas = document.getElementById('processCanvas');
        let pCtx = processCanvas.getContext('2d', { willReadFrequently: true });
        
        let isRunning = false;
        let isAiBusy = false; 
        
        let targetAnchors = [];      
        let currentAnchors = [];     
        
        let lastVideoTime = performance.now();
        let lastAiTime = performance.now();

        const aiWorker = new Worker('worker.js');

        aiWorker.onmessage = (e) => {
            const msg = e.data;
            if (msg.type === 'ready') {
                document.getElementById('status').innerText = "TRACKING ACTIVE";
                startWebcam();
            } 
            else if (msg.type === 'result') {
                const now = performance.now();
                document.getElementById('aiFps').innerText = `AI: ${(1000 / (now - lastAiTime)).toFixed(1)} FPS`;
                lastAiTime = now;

                targetAnchors = parseFpnOutput(msg.outputData, IMAGE_SIZE);
                isAiBusy = false; 
            } 
            else if (msg.type === 'error') {
                console.error("AI Error:", msg.message);
                document.getElementById('status').style.color = "#ff4444";
                document.getElementById('status').innerText = "AI ERROR";
            }
        };

        function startWebcam() {
            // facingMode: "user" requests the front camera on mobile devices
            navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: "user" }, 
                audio: false 
            })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    outputCanvas.width = video.videoWidth;
                    outputCanvas.height = video.videoHeight;
                    isRunning = true;
                    requestAnimationFrame(drawVideoLoop);
                };
            })
            .catch(err => {
                document.getElementById('status').innerText = "CAMERA DENIED";
                document.getElementById('status').style.color = "#ff4444";
            });
        }

        function sendNextFrameToWorker() {
            isAiBusy = true; 

            const w = video.videoWidth;
            const h = video.videoHeight;
            const minDim = Math.min(w, h);
            const startX = (w - minDim) / 2;
            const startY = (h - minDim) / 2;

            pCtx.drawImage(video, startX, startY, minDim, minDim, 0, 0, IMAGE_SIZE, IMAGE_SIZE);
            
            const imageData = pCtx.getImageData(0, 0, IMAGE_SIZE, IMAGE_SIZE).data;
            const float32Data = new Float32Array(3 * IMAGE_SIZE * IMAGE_SIZE);
            
            const mean = [0.485, 0.456, 0.406];
            const std = [0.229, 0.224, 0.225];

            for (let i = 0; i < IMAGE_SIZE * IMAGE_SIZE; i++) {
                float32Data[i] = ((imageData[i * 4] / 255.0) - mean[0]) / std[0]; 
                float32Data[IMAGE_SIZE * IMAGE_SIZE + i] = ((imageData[i * 4 + 1] / 255.0) - mean[1]) / std[1]; 
                float32Data[2 * IMAGE_SIZE * IMAGE_SIZE + i] = ((imageData[i * 4 + 2] / 255.0) - mean[2]) / std[2]; 
            }

            aiWorker.postMessage({ type: 'predict', tensorData: float32Data }, [float32Data.buffer]);
        }

        function drawVideoLoop() {
            if (!isRunning) return;

            const now = performance.now();
            document.getElementById('videoFps').innerText = `Cam: ${(1000 / (now - lastVideoTime)).toFixed(1)} FPS`;
            lastVideoTime = now;

            const w = video.videoWidth;
            const h = video.videoHeight;

            ctx.drawImage(video, 0, 0, w, h);

            if (currentAnchors.length !== targetAnchors.length) {
                currentAnchors = targetAnchors.map(a => ({...a}));
            } else {
                for(let i=0; i<targetAnchors.length; i++) {
                    currentAnchors[i].x += (targetAnchors[i].x - currentAnchors[i].x) * SNAP_SPEED;
                    currentAnchors[i].y += (targetAnchors[i].y - currentAnchors[i].y) * SNAP_SPEED;
                }
            }

            const minDim = Math.min(w, h);
            const startX = (w - minDim) / 2;
            const startY = (h - minDim) / 2;
            const scale = minDim / IMAGE_SIZE;

            // Draw the tracking dots
            currentAnchors.forEach(anchor => {
                const finalX = startX + (anchor.x * scale);
                const finalY = startY + (anchor.y * scale);

                ctx.beginPath();
                ctx.arc(finalX, finalY, 6, 0, 2 * Math.PI); 
                ctx.fillStyle = '#00ff88'; 
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ffffff'; 
                ctx.stroke();
            });

            if (!isAiBusy) sendNextFrameToWorker();
            requestAnimationFrame(drawVideoLoop); 
        }

        function parseFpnOutput(data, size) {
            const mask = new Uint8Array(size * size);
            
            // Channel 1 (Ear) > Channel 0 (Background)
            for(let i=0; i<size*size; i++) {
                mask[i] = data[size * size + i] > data[i] ? 1 : 0;
            }

            const visited = new Uint8Array(size * size);
            const blobs = [];

            for(let y = 0; y < size; y++) {
                for(let x = 0; x < size; x++) {
                    const idx = y * size + x;
                    if (mask[idx] === 1 && visited[idx] === 0) {
                        const blob = bfs(mask, visited, x, y, size);
                        // Filter out noise. At 256x256, ears will be larger than 60 pixels.
                        if (blob.pixels.length > 60) { 
                            blobs.push(blob);
                        }
                    }
                }
            }

            blobs.sort((a, b) => b.pixels.length - a.pixels.length);
            const topTwo = blobs.slice(0, 2).sort((a, b) => a.minX - b.minX);

            return topTwo.map(b => {
                const earHeight = b.maxY - b.minY;
                const lobeTopY = b.maxY - Math.floor(earHeight * 0.20);
                
                let sumX = 0, count = 0;
                b.pixels.forEach(p => {
                    const px = p % size;
                    const py = Math.floor(p / size);
                    if (py >= lobeTopY) { sumX += px; count++; }
                });
                
                return { 
                    x: count > 0 ? sumX / count : (b.minX + b.maxX) / 2, 
                    // Set the point slightly up from the absolute bottom for the piercing
                    y: b.maxY - Math.floor(earHeight * 0.18) 
                };
            });
        }

        function bfs(mask, visited, startX, startY, size) {
            const queue = [startY * size + startX];
            visited[startY * size + startX] = 1;
            const blob = { 
                minY: startY, maxY: startY, 
                minX: startX, maxX: startX, 
                pixels: [] 
            };
            
            let head = 0;
            while(head < queue.length) {
                const currIdx = queue[head++];
                const cx = currIdx % size;
                const cy = Math.floor(currIdx / size);
                
                blob.pixels.push(currIdx);
                if (cy < blob.minY) blob.minY = cy;
                if (cy > blob.maxY) blob.maxY = cy;
                if (cx < blob.minX) blob.minX = cx;
                if (cx > blob.maxX) blob.maxX = cx;

                [[-1,0], [1,0], [0,-1], [0,1]].forEach(([dx, dy]) => {
                    const nx = cx + dx, ny = cy + dy;
                    if (nx >= 0 && nx < size && ny >= 0 && ny < size) {
                        const nIdx = ny * size + nx;
                        if (mask[nIdx] === 1 && visited[nIdx] === 0) {
                            visited[nIdx] = 1;
                            queue.push(nIdx);
                        }
                    }
                });
            }
            return blob;
        }
    </script>
</body>
</html>

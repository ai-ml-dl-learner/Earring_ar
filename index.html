<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dual AI: Ear + Background</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js"></script>

<style>
body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
}

#container {
    position: relative;
    width: 100%;
    max-width: 640px;
}

video { display: none; }

canvas {
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

#panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

#status {
    background: rgba(0,0,0,0.7);
    color: #00ff88;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: bold;
}

.controls {
    background: rgba(0,0,0,0.7);
    padding: 8px;
    border-radius: 4px;
    color: white;
    font-size: 13px;
}

select, input[type="file"] {
    background: #333;
    color: white;
    border: 1px solid #555;
    padding: 4px;
    border-radius: 4px;
}
</style>
</head>

<body>

<div id="container">

    <div id="panel">
        <div id="status">Loading AI...</div>

        <div class="controls">
            <label>Background:</label>
            <select id="bgMode">
                <option value="none">Normal</option>
                <option value="blur">Blur</option>
                <option value="image">Custom Image</option>
            </select>

            <div id="fileBox" style="display:none; margin-top:6px;">
                <input type="file" id="bgImageInput" accept="image/*">
            </div>
        </div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="outputCanvas"></canvas>

</div>

<canvas id="processCanvas" width="256" height="256" style="display:none;"></canvas>

<script>

const IMAGE_SIZE = 256;

const video = document.getElementById("video");
const canvas = document.getElementById("outputCanvas");
const ctx = canvas.getContext("2d");

const processCanvas = document.getElementById("processCanvas");
const pCtx = processCanvas.getContext("2d");

const bgModeSelect = document.getElementById("bgMode");
const bgImageInput = document.getElementById("bgImageInput");
const fileBox = document.getElementById("fileBox");

let currentBgMode = "none";
let customBgImage = null;

bgModeSelect.addEventListener("change", e => {
    currentBgMode = e.target.value;
    fileBox.style.display = currentBgMode === "image" ? "block" : "none";
});

bgImageInput.addEventListener("change", e => {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    customBgImage = new Image();
    customBgImage.src = url;
});

/* =========================
   AI STATE
========================= */

let isRunning = false;
let isEarBusy = false;
let isBodyBusy = false;

let lastEarOutput = null;
let lastBodyMask = null;

let readyCount = 0;
function checkReady() {
    readyCount++;
    if (readyCount === 2) {
        document.getElementById("status").innerText = "AI Ready";
        startCamera();
    }
}

/* =========================
   ONNX WORKER
========================= */

const worker = new Worker("worker.js");

worker.onmessage = e => {
    const msg = e.data;

    if (msg.type === "ready") {
        checkReady();
    }
    else if (msg.type === "result") {
        lastEarOutput = msg.outputData;
        isEarBusy = false;
    }
    else if (msg.type === "error") {
        console.error(msg.message);
    }
};

/* =========================
   MEDIAPIPE
========================= */

const selfieSegmentation = new SelfieSegmentation({
    locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/${file}`
});

selfieSegmentation.setOptions({ modelSelection: 1 });

const bodyMaskCanvas = document.createElement("canvas");
const bodyMaskCtx = bodyMaskCanvas.getContext("2d");

selfieSegmentation.onResults(results => {

    bodyMaskCanvas.width = results.segmentationMask.width;
    bodyMaskCanvas.height = results.segmentationMask.height;

    bodyMaskCtx.clearRect(0,0,bodyMaskCanvas.width,bodyMaskCanvas.height);
    bodyMaskCtx.drawImage(results.segmentationMask,0,0);

    lastBodyMask = bodyMaskCanvas;
    isBodyBusy = false;
});

checkReady();

/* =========================
   START CAMERA
========================= */

function startCamera() {
    navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } },
        audio: false
    }).then(stream => {
        video.srcObject = stream;
        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            isRunning = true;
            requestAnimationFrame(renderLoop);
        };
    });
}

/* =========================
   PREPROCESS (ONNX)
========================= */

function preprocess(imageData) {

    const floatData = new Float32Array(3 * IMAGE_SIZE * IMAGE_SIZE);

    const mean = [0.485,0.456,0.406];
    const std = [0.229,0.224,0.225];

    for (let i=0;i<IMAGE_SIZE*IMAGE_SIZE;i++) {

        const r = imageData[i*4]/255;
        const g = imageData[i*4+1]/255;
        const b = imageData[i*4+2]/255;

        floatData[i] = (r-mean[0])/std[0];
        floatData[IMAGE_SIZE*IMAGE_SIZE+i] = (g-mean[1])/std[1];
        floatData[2*IMAGE_SIZE*IMAGE_SIZE+i] = (b-mean[2])/std[2];
    }

    return floatData;
}

/* =========================
   TRIGGER AIs
========================= */

function triggerAI() {

    const w = video.videoWidth;
    const h = video.videoHeight;

    if (!isEarBusy) {
        isEarBusy = true;

        const minDim = Math.min(w,h);
        const startX = (w-minDim)/2;
        const startY = (h-minDim)/2;

        pCtx.drawImage(video,startX,startY,minDim,minDim,0,0,IMAGE_SIZE,IMAGE_SIZE);

        const imgData = pCtx.getImageData(0,0,IMAGE_SIZE,IMAGE_SIZE).data;
        const tensorData = preprocess(imgData);

        worker.postMessage({type:"predict",tensorData:tensorData},[tensorData.buffer]);
    }

    if (!isBodyBusy && currentBgMode !== "none") {
        isBodyBusy = true;
        selfieSegmentation.send({image:video});
    }
}

/* =========================
   DRAW EAR MASK
========================= */

function drawEarMask(data,w,h) {

    const minDim = Math.min(w,h);
    const startX = (w-minDim)/2;
    const startY = (h-minDim)/2;

    const maskCanvas = document.createElement("canvas");
    maskCanvas.width = IMAGE_SIZE;
    maskCanvas.height = IMAGE_SIZE;

    const maskCtx = maskCanvas.getContext("2d");
    const img = maskCtx.createImageData(IMAGE_SIZE,IMAGE_SIZE);
    const px = img.data;

    for (let i=0;i<IMAGE_SIZE*IMAGE_SIZE;i++) {

        const ear = data[IMAGE_SIZE*IMAGE_SIZE+i] > data[i];

        if (ear) {
            px[i*4]=0;
            px[i*4+1]=255;
            px[i*4+2]=0;
            px[i*4+3]=160;
        }
    }

    maskCtx.putImageData(img,0,0);

    ctx.drawImage(maskCanvas,-w+startX,startY,minDim,minDim);
}

/* =========================
   MAIN LOOP
========================= */

function renderLoop() {

    if (!isRunning) return;

    const w = video.videoWidth;
    const h = video.videoHeight;

    ctx.save();
    ctx.scale(-1, 1);

    if (currentBgMode === "none" || !lastBodyMask) {
        ctx.drawImage(video, -w, 0, w, h);
    } else {

        // ---------- STEP 1: Draw background ----------
        if (currentBgMode === "blur") {
            ctx.filter = "blur(25px)";
            ctx.drawImage(video, -w, 0, w, h);
            ctx.filter = "none";
        } 
        else if (currentBgMode === "image" && customBgImage) {
            ctx.drawImage(customBgImage, -w, 0, w, h);
        } 
        else {
            ctx.drawImage(video, -w, 0, w, h);
        }

        // ---------- STEP 2: Keep only background ----------
        ctx.globalCompositeOperation = "destination-out";
        ctx.drawImage(lastBodyMask, -w, 0, w, h);

        // ---------- STEP 3: Draw person ----------
        ctx.globalCompositeOperation = "destination-over";
        ctx.drawImage(video, -w, 0, w, h);

        ctx.globalCompositeOperation = "source-over";
    }

    if (lastEarOutput) {
        drawEarMask(lastEarOutput, w, h);
    }

    ctx.restore();

    triggerAI();
    requestAnimationFrame(renderLoop);
}


</script>
</body>
</html>
